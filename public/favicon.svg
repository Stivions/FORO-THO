<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" fill="#050810"/>
  <!-- Corner brackets -->
  <polyline points="2,8 2,2 8,2" stroke="#00fff5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="24,2 30,2 30,8" stroke="#00fff5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="2,24 2,30 8,30" stroke="#00fff5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="24,30 30,30 30,24" stroke="#00fff5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diamond eye -->
  <polygon points="16,7 25,16 16,25 7,16" stroke="#00fff5" stroke-width="1.4" fill="none"/>
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="4.5" fill="#00fff5" opacity="0.15"/>
  <circle cx="16" cy="16" r="4.5" stroke="#00fff5" stroke-width="1.2"/>
  <!-- Pupil dot -->
  <circle cx="16" cy="16" r="1.8" fill="#00fff5"/>
</svg>
